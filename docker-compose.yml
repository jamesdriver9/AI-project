services:
  finance-agent:
    build: .
    working_dir: /app
    # Using the standard command for the background engine
    command: ["python", "llm_agent.py"]
    volumes:
      - ".:/app"
      - "./data:/app/data" # Removed :ro to allow audit logs to be written
    env_file:
      - .env
    networks:
      - finance-net

  ui:
    build: .
    working_dir: /app
    volumes:
      - ".:/app"
      - "./data:/app/data"
    # Optimized 2026 Streamlit Flags: 
    # 1. Headless=true stops the 10-second "looking for browser" hang
    # 2. FileWatcher=none prevents Windows-Docker disk lag
    command: >
      python -m streamlit run app_ui.py 
      --server.port 8501 
      --server.address 0.0.0.0 
      --server.headless true
      --server.fileWatcherType none
      --browser.gatherUsageStats false
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - finance-agent
    networks:
      - finance-net

networks:
  finance-net:
    driver: bridge